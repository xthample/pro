<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipper Pro V4 — Universal AI Scout</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h2 style="font-size: 24px; margin-bottom: 5px;">🔍 Universal Content Scout</h2>
    <p style="color: var(--text-dim); font-size: 14px;">Masukkan link YouTube apa pun (Podcast, Gaming, Edukasi, dll).</p>
    
    <div class="input-group">
        <input type="url" id="videoUrl" placeholder="Tempel link YouTube di sini...">
        <button class="btn" id="genBtn" onclick="runAI()">Analyze Content</button>
    </div>

    <div style="display: flex; gap: 15px; align-items: center;">
        <select id="model" style="max-width: 300px;">
            <option value="meta-llama/llama-3.1-8b-instruct:free">Llama 3.1 8B (Deep Analysis)</option>
            <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash (Fastest)</option>
        </select>
        <span style="font-size: 12px; color: var(--text-dim);">⏱ Durasi: 30s - 60s per clip</span>
    </div>
</div>

<div id="status" style="display:none; text-align:center; padding: 20px; color: var(--accent2); font-weight: bold;">
    AI sedang membedah isi video dan mencari momen terbaik...
</div>

<div class="clips-grid" id="clipsContainer"></div>

<script>
    async function runAI() {
        const urlInput = document.getElementById('videoUrl').value;
        
        // FIX: Menggunakan nama key yang konsisten dengan fungsi saveApiKey (cp_apikey)
        const key = localStorage.getItem('cp_apikey'); 
        
        if(!urlInput) return alert('Masukkan link YouTube dulu bro!');
        
        // Alert khusus jika API Key belum tersimpan
        if(!key) {
            showApiPanel(); // Tampilkan panel API agar user bisa isi
            return alert('API Key belum di-set atau belum disimpan di pengaturan!');
        }

        const videoId = urlInput.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&]{11})/)?.[1];
        if(!videoId) return alert('Link YouTube tidak valid!');
        
        const btn = document.getElementById('genBtn');
        btn.disabled = true;
        document.getElementById('status').style.display = 'block';
        const container = document.getElementById('clipsContainer');
        container.innerHTML = '';

        // Prompt Universal Anti-Halusinasi
        const prompt = `Lupakan semua topik sebelumnya. Analisis URL ini: ${urlInput}. 
        Tugas:
        1. Identifikasi topik ASLI video.
        2. Cari 3 momen HOOK terkuat.
        3. Durasi PER CLIP WAJIB 30-60 detik.
        4. Berikan JUDUL SEO viral.
        Format JSON: {"clips": [{"title": "...", "start": 10, "end": 55, "hook_reason": "..."}]}`;

        try {
            // Deteksi jika running di Vercel atau Local
            const isLocal = window.location.hostname === 'localhost';
            const endpoint = isLocal ? 'https://openrouter.ai/api/v1/chat/completions' : '/api/chat';

            const res = await fetch(endpoint, {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${key}`, 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({
                    model: document.getElementById('model').value,
                    messages: [{role: 'user', content: prompt}],
                    temperature: 0.1
                })
            });

            if (!res.ok) {
                const errorData = await res.json();
                throw new Error(errorData.error?.message || 'Server Error');
            }

            const data = await res.json();
            const content = data.choices[0].message.content;
            const jsonMatch = content.match(/\{[\s\S]*\}/);
            const parsed = JSON.parse(jsonMatch[0]);

            renderClips(parsed.clips, videoId);
        } catch (e) {
            console.error('AI Error:', e);
            alert('Gagal memproses: ' + e.message);
        } finally {
            btn.disabled = false;
            document.getElementById('status').style.display = 'none';
        }
    }
</script>

</body>
</html>
