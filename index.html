<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipper Pro — AI Video Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div class="app">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo">Clipper Pro</div>
        </div>
        <nav class="sidebar-nav">
            <button class="nav-item active">🎬 Video Generator</button>
            <button class="nav-item" onclick="toggleApi()">🔑 API Settings</button>
        </nav>
    </aside>

    <main class="main">
        <section id="apiSection" class="card" style="display:none;">
            <h3>OpenRouter Configuration</h3>
            <div class="input-group">
                <input type="password" id="apiKey" placeholder="sk-or-v1-...">
                <button class="btn btn-accent" onclick="saveKey()">Save Key</button>
            </div>
        </section>

        <section class="card">
            <h2>Generate Viral Clips</h2>
            <p style="color:var(--text2); margin-bottom:15px; font-size:14px;">Masukkan link YouTube untuk dianalisis oleh AI.</p>
            <div class="input-group">
                <input type="url" id="videoUrl" placeholder="https://youtube.com/watch?v=...">
                <button class="btn btn-accent" id="genBtn" onclick="runAI()">Analyze & Generate</button>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <select id="model">
                    <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash (Fast)</option>
                    <option value="meta-llama/llama-3.1-8b-instruct:free">Llama 3.1 8B (Accurate)</option>
                </select>
                <select id="lang">
                    <option value="id">Bahasa Indonesia</option>
                    <option value="en">English</option>
                </select>
            </div>
        </section>

        <div id="status" class="card" style="display:none; border-left: 4px solid var(--accent);">
            <div id="loader" class="spinner"></div>
            <span id="statusText">AI sedang bekerja...</span>
        </div>

        <div class="clips-grid" id="clipsContainer">
            </div>
    </main>
</div>

<script>
   let key = localStorage.getItem('cp_key') || '';
    if(!key) document.getElementById('apiSection').style.display = 'block';

    function saveKey() {
        key = document.getElementById('apiKey').value;
        localStorage.setItem('cp_key', key);
        document.getElementById('apiSection').style.display = 'none';
        alert('API Key tersimpan!');
    }

    async function runAI() {
        const urlInput = document.getElementById('videoUrl').value;
        if(!urlInput || !key) return alert('Lengkapi Data!');

        // Ekstrak ID YouTube untuk pemutar video
        const videoId = urlInput.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&]{11})/)?.[1];

        const btn = document.getElementById('genBtn');
        const status = document.getElementById('status');
        btn.disabled = true;
        status.style.display = 'block';

        // PROMPT ANTI-HALUSINASI: Memaksa AI melihat URL secara harfiah
        const prompt = `URL VIDEO: ${urlInput}
        Tugas Kritis:
        1. Anda adalah asisten riset konten. JANGAN MENGARANG.
        2. Identifikasi SUBJEK ASLI video dari URL tersebut 
        3. Jika tidak yakin, fokus pada metadata yang mungkin ada pada URL.
        4. Buat 3 segmen lucu/penting dalam JSON.
        5. Bahasa: ${document.getElementById('lang').value}.
        Format: {"summary": "...", "clips": [{"title": "...", "t": "detik_mulai", "dur": "durasi", "score": 95}]}`;

        try {
            const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${key}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    model: document.getElementById('model').value,
                    messages: [{role: 'user', content: prompt}],
                    temperature: 0.1 // Rendah agar tidak mengarang
                })
            });

            const data = await res.json();
            const content = data.choices[0].message.content;
            const jsonMatch = content.match(/\{[\s\S]*\}/);
            const parsed = JSON.parse(jsonMatch[0]);

            renderClips(parsed.clips, videoId);
        } catch (e) {
            alert('Error: AI Gagal menganalisis.');
        } finally {
            btn.disabled = false;
            status.style.display = 'none';
        }
    }

    function renderClips(clips, vId) {
        const container = document.getElementById('clipsContainer');
        container.innerHTML = clips.map(c => `
            <div class="clip-card">
                <div class="clip-thumb">
                    <iframe width="100%" height="100%" src="https://www.youtube.com/embed/${vId}?start=${c.t}" frameborder="0" allowfullscreen></iframe>
                </div>
                <div class="clip-info">
                    <div style="font-weight:bold;">${c.title}</div>
                    <p style="font-size:11px; color:var(--text3); margin:5px 0;">Mulai pada detik ke: ${c.t}</p>
                    <div style="display:flex; gap:5px; margin-top:10px;">
                        <a href="https://www.ssyoutube.com/watch?v=${vId}" target="_blank" class="btn btn-accent" style="font-size:10px; padding:5px 10px;">Download Clip</a>
                    </div>
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
