<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipper Pro V4 — Universal AI Scout</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="card">
    <h2 style="font-size: 24px; margin-bottom: 5px;">🔍 Universal Content Scout</h2>
    <p style="color: var(--text-dim); font-size: 14px;">Masukkan link YouTube apa pun (Podcast, Gaming, Edukasi, dll).</p>
    
    <div class="input-group">
        <input type="url" id="videoUrl" placeholder="Tempel link YouTube di sini...">
        <button class="btn" id="genBtn" onclick="runAI()">Analyze Content</button>
    </div>

    <div style="display: flex; gap: 15px; align-items: center;">
        <select id="model" style="max-width: 300px;">
            <option value="meta-llama/llama-3.1-8b-instruct:free">Llama 3.1 8B (Deep Analysis)</option>
            <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash (Fastest)</option>
        </select>
        <span style="font-size: 12px; color: var(--text-dim);">⏱ Durasi: 30s - 60s per clip</span>
    </div>
</div>

<div id="status" style="display:none; text-align:center; padding: 20px; color: var(--accent2); font-weight: bold;">
    AI sedang membedah isi video dan mencari momen terbaik...
</div>

<div class="clips-grid" id="clipsContainer"></div>

<script>
    async function runAI() {
        const urlInput = document.getElementById('videoUrl').value;
        const key = localStorage.getItem('cp_apikey'); // Mengambil key dari session Clipper Pro
        
        if(!urlInput) return alert('Masukkan link YouTube dulu bro!');
        if(!key) return alert('API Key belum di-set di pengaturan!');

        // Regex untuk ambil ID YouTube
        const videoId = urlInput.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&]{11})/)?.[1];
        if(!videoId) return alert('Link YouTube tidak valid!');
        
        const btn = document.getElementById('genBtn');
        btn.disabled = true;
        document.getElementById('status').style.display = 'block';
        const container = document.getElementById('clipsContainer');
        container.innerHTML = '';

        // UNIVERSAL PROMPT (Anti-Sule/Anti-Lyodra bias)
        const prompt = `Lupakan semua topik sebelumnya. Analisis secara mentah URL ini: ${urlInput}
        
        INSTRUKSI KHUSUS:
        1. Identifikasi topik ASLI dari video tersebut (Apapun jenis kontennya).
        2. Cari 3 momen dengan "HOOK" terkuat (kejadian paling menarik perhatian di awal segmen).
        3. Setiap segmen HARUS memiliki durasi minimal 30 detik dan maksimal 60 detik.
        4. Buat JUDUL SEO yang kuat untuk platform Shorts/TikTok.
        
        OUTPUT FORMAT (JSON SAJA):
        {
          "clips": [
            {
              "title": "Judul SEO Viral",
              "start": 10,
              "end": 55,
              "hook_reason": "Kenapa momen ini dipilih sebagai hook?"
            }
          ]
        }`;

        try {
            const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: { 
                    'Authorization': `Bearer ${key}`, 
                    'Content-Type': 'application/json' 
                },
                body: JSON.stringify({
                    model: document.getElementById('model').value,
                    messages: [{role: 'user', content: prompt}],
                    temperature: 0.1 // Temperatur rendah agar AI tidak mengarang bebas
                })
            });

            const data = await res.json();
            const content = data.choices[0].message.content;
            
            // Parsing aman dengan regex
            const jsonMatch = content.match(/\{[\s\S]*\}/);
            const parsed = JSON.parse(jsonMatch[0]);

            renderClips(parsed.clips, videoId);
        } catch (e) {
            console.error(e);
            alert('Gagal memproses video. Pastikan link bisa diakses atau coba lagi.');
        } finally {
            btn.disabled = false;
            document.getElementById('status').style.display = 'none';
        }
    }

    function renderClips(clips, vId) {
        const container = document.getElementById('clipsContainer');
        container.innerHTML = clips.map(c => `
            <div class="clip-card">
                <div class="video-container">
                    <iframe width="100%" height="100%" 
                        src="https://www.youtube.com/embed/${vId}?start=${c.start}&end=${c.end}&rel=0" 
                        frameborder="0" allowfullscreen>
                    </iframe>
                </div>
                <div class="clip-info">
                    <span class="badge-seo">SEO Optimized</span>
                    <div style="font-weight:bold; font-size:17px; margin-bottom: 10px;">${c.title}</div>
                    <div style="font-size:12px; color:var(--text-dim);">
                        ⏱ <b>Durasi:</b> ${c.end - c.start} detik (${c.start}s - ${c.end}s)
                    </div>
                    <div class="hook-text">
                        <b>Hook:</b> ${c.hook_reason}
                    </div>
                    <a href="https://www.ssyoutube.com/watch?v=${vId}" target="_blank" class="btn" 
                       style="display:block; text-align:center; margin-top:20px; font-size:13px; text-decoration:none;">
                       Download Link
                    </a>
                </div>
            </div>
        `).join('');
    }
</script>

</body>
</html>
