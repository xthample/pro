<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clipper Pro — AI Video Generator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div class="app">
    <aside class="sidebar">
        <div class="sidebar-logo">
            <div class="logo">Clipper Pro</div>
        </div>
        <nav class="sidebar-nav">
            <button class="nav-item active">🎬 Video Generator</button>
            <button class="nav-item" onclick="toggleApi()">🔑 API Settings</button>
        </nav>
    </aside>

    <main class="main">
        <section id="apiSection" class="card" style="display:none;">
            <h3>OpenRouter Configuration</h3>
            <div class="input-group">
                <input type="password" id="apiKey" placeholder="sk-or-v1-...">
                <button class="btn btn-accent" onclick="saveKey()">Save Key</button>
            </div>
        </section>

        <section class="card">
            <h2>Generate Viral Clips</h2>
            <p style="color:var(--text2); margin-bottom:15px; font-size:14px;">Masukkan link YouTube untuk dianalisis oleh AI.</p>
            <div class="input-group">
                <input type="url" id="videoUrl" placeholder="https://youtube.com/watch?v=...">
                <button class="btn btn-accent" id="genBtn" onclick="runAI()">Analyze & Generate</button>
            </div>
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                <select id="model">
                    <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash (Fast)</option>
                    <option value="meta-llama/llama-3.1-8b-instruct:free">Llama 3.1 8B (Accurate)</option>
                </select>
                <select id="lang">
                    <option value="id">Bahasa Indonesia</option>
                    <option value="en">English</option>
                </select>
            </div>
        </section>

        <div id="status" class="card" style="display:none; border-left: 4px solid var(--accent);">
            <div id="loader" class="spinner"></div>
            <span id="statusText">AI sedang bekerja...</span>
        </div>

        <div class="clips-grid" id="clipsContainer">
            </div>
    </main>
</div>

<script>
    let key = localStorage.getItem('cp_key') || '';
    if(!key) document.getElementById('apiSection').style.display = 'block';

    function saveKey() {
        key = document.getElementById('apiKey').value;
        localStorage.setItem('cp_key', key);
        document.getElementById('apiSection').style.display = 'none';
        alert('API Key tersimpan!');
    }

    function toggleApi() {
        const s = document.getElementById('apiSection');
        s.style.display = s.style.display === 'none' ? 'block' : 'none';
    }

    async function runAI() {
        const url = document.getElementById('videoUrl').value;
        if(!url || !key) return alert('Lengkapi Data!');

        const btn = document.getElementById('genBtn');
        const status = document.getElementById('status');
        btn.disabled = true;
        status.style.display = 'block';

        // PROMPT FIX: Memaksa AI memberikan data asli video, bukan halusinasi
        const prompt = `Analisis secara mendalam video YouTube ini: ${url}. 
        Tugas Anda:
        1. Identifikasi topik asli video (Jangan berhalusinasi).
        2. Buat 3 clip viral dalam format JSON.
        3. Gunakan Bahasa ${document.getElementById('lang').value}.
        Format Output: {"summary": "...", "clips": [{"title": "...", "start": "00:10", "end": "00:40", "score": 95}]}`;

        try {
            const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${key}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    model: document.getElementById('model').value,
                    messages: [{role: 'user', content: prompt}]
                })
            });

            const data = await res.json();
            const content = data.choices[0].message.content;
            
            // Parsing JSON dengan Regex agar aman dari teks tambahan AI
            const jsonMatch = content.match(/\{[\s\S]*\}/);
            const parsed = JSON.parse(jsonMatch[0]);

            renderClips(parsed.clips);
        } catch (e) {
            console.error(e);
            alert('Gagal mengambil data. Pastikan API Key valid.');
        } finally {
            btn.disabled = false;
            status.style.display = 'none';
        }
    }

    function renderClips(clips) {
        const container = document.getElementById('clipsContainer');
        container.innerHTML = clips.map(c => `
            <div class="clip-card">
                <div class="clip-thumb">🎬</div>
                <div class="clip-info">
                    <div class="clip-time">${c.start} - ${c.end}</div>
                    <div style="font-weight:bold; margin-top:5px;">${c.title}</div>
                    <div style="font-size:12px; color:var(--green); margin-top:5px;">Viral Score: ${c.score}%</div>
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
